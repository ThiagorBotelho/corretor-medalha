<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corretor — Arquitetura Medalhão</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
 
  .header { background: #fff; border-bottom: 1px solid #e5e5e3; padding: 1rem 2rem; display: flex; align-items: center; gap: 12px; }
  .header-icon { width: 36px; height: 36px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .header-icon svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header p { font-size: 13px; color: #666; }
  .container { max-width: 780px; margin: 0 auto; padding: 2rem 1rem; }
 
  .card { background: #fff; border: 1px solid #e5e5e3; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 1rem; }
 
  label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px; color: #444; }
  input[type="text"] { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.15s; }
  input:focus { border-color: #888; }
 
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s, opacity 0.15s; }
  .btn-primary { background: #1a1a1a; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #333; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-secondary { background: #f0f0ee; color: #333; border: 1px solid #e0e0de; }
  .btn-secondary:hover { background: #e5e5e3; }
  .btn-ghost { background: transparent; color: #555; font-size: 13px; padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-weight: 500; }
  .btn-ghost:hover { background: #f5f5f3; }
 
  /* Stepper */
  .stepper { display: flex; align-items: flex-start; margin-bottom: 2rem; }
  .step { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; }
  .step:not(:last-child)::after { content: ''; position: absolute; top: 15px; left: 55%; width: 90%; height: 2px; background: #e5e5e3; z-index: 0; transition: background 0.4s; }
  .step:not(:last-child).done::after { background: #16a34a; }
  .step-circle { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; z-index: 1; border: 2px solid #ddd; background: #fff; color: #bbb; transition: all 0.3s; }
  .step.active .step-circle { border-color: #1a1a1a; color: #1a1a1a; background: #fff; }
  .step.done .step-circle { border-color: #16a34a; background: #16a34a; color: #fff; }
  .step-label { font-size: 11px; color: #bbb; margin-top: 6px; font-weight: 500; text-align: center; }
  .step.active .step-label { color: #1a1a1a; }
  .step.done .step-label { color: #16a34a; }
 
  /* Upload zone */
  .upload-zone { border: 2px dashed #ddd; border-radius: 12px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .upload-zone:hover { border-color: #888; background: #fafafa; }
  .upload-zone.has-file { border-color: #16a34a; border-style: solid; background: #f0fdf4; }
  .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-zone-icon { font-size: 38px; margin-bottom: 10px; }
  .upload-zone-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .upload-zone-sub { font-size: 13px; color: #888; }
  .upload-zone-file { font-size: 13px; color: #16a34a; font-weight: 600; margin-top: 8px; }
 
  .action-row { display: flex; gap: 10px; align-items: center; margin-top: 1rem; flex-wrap: wrap; }
 
  /* Thinking */
  .thinking-bar { display: flex; align-items: center; gap: 10px; padding: 1rem 1.25rem; background: #f8f9fa; border-radius: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #888; animation: blink 1.2s infinite; flex-shrink: 0; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  .thinking-text { font-size: 13px; color: #555; }
 
  /* Layer result */
  .layer-result { border-radius: 10px; overflow: hidden; margin-bottom: 1.25rem; border: 1px solid; }
  .layer-result.bronze { border-color: #fed7aa; }
  .layer-result.silver { border-color: #cbd5e1; }
  .layer-result.gold   { border-color: #fde047; }
  .layer-result-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .layer-result.bronze .layer-result-header { background: #fff7ed; }
  .layer-result.silver .layer-result-header { background: #f8fafc; }
  .layer-result.gold   .layer-result-header { background: #fefce8; }
  .layer-result-title { font-size: 14px; font-weight: 600; }
  .score-pill { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .bronze-pill { background: #fed7aa; color: #9a3412; }
  .silver-pill { background: #e2e8f0; color: #334155; }
  .gold-pill   { background: #fef08a; color: #854d0e; }
  .layer-result-body { padding: 0 16px; overflow: hidden; max-height: 0; transition: max-height 0.35s ease; }
  .layer-result-body.open { max-height: 2000px; padding: 4px 16px 16px; }
 
  .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0ee; }
  .check-item:last-child { border-bottom: none; }
  .check-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; font-size: 10px; font-weight: 700; }
  .check-pass    { background: #dcfce7; color: #166534; }
  .check-fail    { background: #fee2e2; color: #991b1b; }
  .check-partial { background: #fef3c7; color: #92400e; }
  .check-label { font-size: 13px; font-weight: 500; }
  .check-detail { font-size: 12px; color: #777; margin-top: 2px; line-height: 1.5; }
  .narrative { font-size: 13px; color: #555; line-height: 1.7; padding: 10px 0 2px; border-top: 1px solid #f0f0ee; margin-top: 6px; }
 
  /* Final score */
  .final-score-row { display: flex; align-items: center; gap: 20px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .score-big { font-size: 52px; font-weight: 800; line-height: 1; }
  .score-label { font-size: 13px; color: #666; margin-top: 4px; }
  .score-bar-wrap { flex: 1; min-width: 180px; background: #f0f0ee; border-radius: 99px; height: 10px; }
  .score-bar { border-radius: 99px; height: 10px; transition: width 0.8s ease; }
  .mini-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
  .mini-card { border-radius: 8px; padding: 12px; text-align: center; }
  .mini-card .n { font-size: 26px; font-weight: 800; }
  .mini-card .l { font-size: 11px; font-weight: 600; margin-top: 2px; }
  .mc-bronze { background:#fff7ed; } .mc-bronze .n{color:#c2410c;} .mc-bronze .l{color:#9a3412;}
  .mc-silver { background:#f8fafc; } .mc-silver .n{color:#475569;} .mc-silver .l{color:#64748b;}
  .mc-gold   { background:#fefce8; } .mc-gold .n  {color:#ca8a04;} .mc-gold .l  {color:#a16207;}
  .student-name { font-size: 20px; font-weight: 700; margin-bottom: 1rem; }
 
  .report-box { background: #1a1a1a; color: #e5e5e3; border-radius: 10px; padding: 1.25rem; font-size: 12.5px; line-height: 1.75; white-space: pre-wrap; max-height: 480px; overflow-y: auto; margin-top: 1rem; display: none; }
  .report-box.open { display: block; }
 
  .error-box { background: #fff1f2; border: 1px solid #fecdd3; border-radius: 8px; padding: 1rem; font-size: 13px; color: #9f1239; margin-bottom: 1rem; }
 
  @media(max-width:600px) { .mini-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
 
<div class="header">

    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
  </div>

    <h1>Corretor Automático — Arquitetura Medalhão</h1>
    <p>Engenharia de Dados · Análise por Groq AI</p>

</div>

  <!-- Nome -->

  <!-- Erro -->

    <div class="student-name" id="finalName"></div>
    <div class="final-score-row">

        <div class="score-big" id="scoreTotal">—</div>

      <div class="mini-card mc-silver"><div class="n" id="scSilver">—</div><div class="l">Silver / 5 pts</div></div>
      <div class="mini-card mc-gold"  ><div class="n" id="scGold">—</div>  <div class="l">Gold / 3 pts</div></div>
    </div>
    <div class="action-row">
      <button class="btn btn-secondary" onclick="toggleReport()">Ver relatório completo</button>
      <button class="btn-ghost" onclick="copyReport()">Copiar relatório</button>
      <button class="btn-ghost" onclick="resetAll()">Corrigir outro aluno</button>

    <div class="report-box" id="reportBox"></div>
  </div>
 
</div>
 
<script>
const API_KEY = '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';
 
const LAYERS = [
  { key:'bronze', label:'🥉 Bronze', icon:'🥉', sub:'Ingestão de dados', max:2,  pill:'bronze-pill' },
  { key:'silver', label:'🥈 Silver', icon:'🥈', sub:'Transformações',    max:5,  pill:'silver-pill' },
  { key:'gold',   label:'🥇 Gold',   icon:'🥇', sub:'Data Marts',        max:3,  pill:'gold-pill'   }
];
 
const LIMITS = [10000, 18000, 10000];
 
const SYS = `Você é avaliador especialista em Engenharia de Dados com domínio de PySpark, Delta Lake e Databricks. Responda SOMENTE com JSON puro válido, sem markdown, sem texto fora do JSON.`;
 
const PROMPTS = [
`Avalie o notebook BRONZE de um projeto Arquitetura Medalhão (dataset Olist).
 
CRITÉRIOS:
B1 — 9 tabelas criadas com nomes exatos: bronze.tb_customers, bronze.tb_geolocalizacao, bronze.tb_order_items, bronze.tb_order_payments, bronze.tb_order_reviews, bronze.tb_orders, bronze.tb_products, bronze.tb_sellers, bronze.tb_product_category_name_translation
B2 — Coluna timestamp_ingestion em todas as tabelas, registrando o momento exato da inserção
B3 — Ingestão da API PTAX do Banco Central criando bronze.tb_cotacao_dolar, datas no formato MM-DD-AAAA
 
Responda com este JSON exato:
{"nota":<0.0 a 2.0>,"checks":[{"id":"B1","titulo":"9 tabelas bronze criadas","status":"PASSOU|PARCIAL|FALHOU","detalhe":"<observação>"},{"id":"B2","titulo":"Coluna timestamp_ingestion","status":"PASSOU|PARCIAL|FALHOU","detalhe":"<observação>"},{"id":"B3","titulo":"Ingestão API PTAX Banco Central","status":"PASSOU|PARCIAL|FALHOU","detalhe":"<observação>"}],"narrativa":"<3 a 5 frases sobre qualidade geral do notebook bronze>"}`,
 
`Avalie o notebook SILVER de um projeto Arquitetura Medalhão (dataset Olist).
 
CRITÉRIOS:
S1 — dim_consumidores: Window Function ROW_NUMBER particionado por customer_id desc timestamp_ingestion, colunas PT (id_consumidor, prefixo_cep, nome_consumidor, cidade, estado), cidade/estado UPPER CASE
S2 — fat_pedidos: status em PT (delivered→entregue, canceled→cancelado, shipped→enviado, processing→processando, unavailable→indisponível, invoiced→faturado, created→criado, approved→aprovado), colunas derivadas (tempo_entrega_dias, tempo_entrega_estimado_dias, diferenca_entrega_dias, entrega_no_prazo)
S3 — fat_itens_pedidos: order_id→id_pedido, order_item_id→id_item, product_id→id_produto, seller_id→id_vendedor, price→preco_BRL, freight_value→preco_frete
S4 — fat_pagamentos_pedidos: credit_card→Cartão de Crédito, boleto→Boleto, voucher→Voucher, debit_card→Cartão de Débito
S5 — fat_avaliacoes_pedidos: remove pedidos inválidos e datas futuras, try_to_timestamp, nulos→"Sem comentário"/"Sem título"
S6 — dim_produtos: Window Function igual S1, mapeamento completo com dimensões em PT
S7 — dim_vendedores: Window Function igual S1, cidade/estado UPPER CASE, seller_id→id_vendedor
S8 — dim_categoria_produtos_traducao: colunas nome_produto_pt e nome_produto_en
S9 — dim_cotacao_dolar: calendário contínuo para fins de semana, last(ignorenulls=True) com Window Function
S10 — fat_pedido_total: join fat_pedidos+pagamentos+cotacao, colunas (id_pedido, id_consumidor, status, valor_total_pago_brl, valor_total_pago_usd, data_pedido), 2 casas decimais
S11 — OPTIMIZE + ZORDER nas tabelas fato por id_pedido e data_pedido
 
Responda com este JSON exato:
{"nota":<0.0 a 5.0>,"checks":[{"id":"S1","titulo":"dim_consumidores","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"S2","titulo":"fat_pedidos","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"S3","titulo":"fat_itens_pedidos","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"S4","titulo":"fat_pagamentos_pedidos","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"S5","titulo":"fat_avaliacoes_pedidos","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"S6","titulo":"dim_produtos","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"S7","titulo":"dim_vendedores","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"S8","titulo":"dim_categoria_traducao","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"S9","titulo":"dim_cotacao_dolar","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"S10","titulo":"fat_pedido_total","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"S11","titulo":"OPTIMIZE + ZORDER","status":"PASSOU|PARCIAL|FALHOU","detalhe":""}],"narrativa":"<3 a 5 frases sobre qualidade geral do notebook silver>"}`,
 
`Avalie o notebook GOLD de um projeto Arquitetura Medalhão (dataset Olist).
 
CRITÉRIOS:
G1 — fat_vendas_comercial: granularidade ano+mês+categoria, métricas (ano_venda, mes_venda, categoria_produto, total_pedidos countDistinct, qtd_itens_vendidos, receita_total_brl, receita_total_usd, ticket_medio_brl), 2 casas decimais
G2 — Rankings Top 5 via display(): mais vendidos (nome, categoria, qtd) e menos vendidos
G3 — fat_avaliacoes_clientes: granularidade categoria+vendedor+estado, métricas (total_avaliacoes, avaliacao_media, total_avaliacoes_positivas>=4, total_avaliacoes_negativas<=2, percentual_satisfacao)
G4 — Rankings qualidade via display(): produto mais/menos avaliado, vendedor mais/menos avaliado, desempate por volume desc
 
Responda com este JSON exato:
{"nota":<0.0 a 3.0>,"checks":[{"id":"G1","titulo":"fat_vendas_comercial","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"G2","titulo":"Rankings Top 5 vendidos","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"G3","titulo":"fat_avaliacoes_clientes","status":"PASSOU|PARCIAL|FALHOU","detalhe":""},{"id":"G4","titulo":"Rankings qualidade","status":"PASSOU|PARCIAL|FALHOU","detalhe":""}],"narrativa":"<3 a 5 frases sobre qualidade geral do notebook gold>"}`
];
 
let idx = 0;
let currentFile = null;
let studentName = '';
let results = [];
let narrativas = [];
 
function startFlow() {
  studentName = document.getElementById('studentName').value.trim() || 'Aluno';
  document.getElementById('nameCard').style.display = 'none';
  document.getElementById('stepper').style.display = 'flex';
  showUpload(0);
}
 
function showUpload(i) {
  idx = i;
  currentFile = null;
  const L = LAYERS[i];
  document.getElementById('uploadCard').style.display = 'block';
  document.getElementById('thinkingCard').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('uploadTitle').textContent = `Notebook ${L.label}  —  ${L.sub}`;
  document.getElementById('uzIcon').textContent = L.icon;
  document.getElementById('uzTitle').textContent = `Arraste ou clique para selecionar o notebook ${L.key}`;
  document.getElementById('uzSub').textContent = L.sub + ' · .ipynb';
  document.getElementById('uzFile').textContent = '';
  document.getElementById('uploadZone').classList.remove('has-file');
  document.getElementById('fileInput').value = '';
  document.getElementById('analyzeBtn').disabled = true;
  updateStepper(i);
}
 
function updateStepper(active) {
  for (let i = 0; i <= 3; i++) {
    const el = document.getElementById('step-' + i);
    el.className = 'step';
    const c = el.querySelector('.step-circle');
    if (i < active)      { el.classList.add('done');   c.textContent = '✓'; }
    else if (i === active){ el.classList.add('active'); c.textContent = i + 1; }
    else                  { c.textContent = i + 1; }
  }
}
 
function onFileSelected(input) {
  const f = input.files[0];
  if (!f) return;
  currentFile = f;
  document.getElementById('uzFile').textContent = f.name;
  document.getElementById('uploadZone').classList.add('has-file');
  document.getElementById('analyzeBtn').disabled = false;
}
 
async function readNotebook(file, limit) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const nb = JSON.parse(e.target.result);
        let code = '', n = 0;
        (nb.cells || []).forEach(cell => {
          if (cell.cell_type !== 'code') return;
          const src = (Array.isArray(cell.source) ? cell.source.join('') : cell.source).trim();
          if (!src) return;
          const useful = src.split('\n').filter(l => {
            const t = l.trim();
            return t && !t.startsWith('%') && !t.startsWith('!') && !t.startsWith('#');
          });
          if (!useful.length) return;
          if (useful.length <= 2 && useful.every(l => /^(display|print|show)\s*\(/.test(l.trim()))) return;
          code += `# --- Célula ${++n} ---\n${src}\n\n`;
        });
        resolve(code.substring(0, limit));
      } catch(err) { reject(err); }
    };
    r.onerror = reject;
    r.readAsText(file);
  });
}
 
async function runAnalysis() {
  document.getElementById('uploadCard').style.display = 'none';
  document.getElementById('thinkingCard').style.display = 'block';
  document.getElementById('thinkingText').textContent = `Analisando notebook ${LAYERS[idx].label}...`;
  document.getElementById('errorBox').style.display = 'none';
 
  try {
    const code = await readNotebook(currentFile, LIMITS[idx]);
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1800,
        temperature: 0.1,
        messages: [
          { role: 'system', content: SYS },
          { role: 'user',   content: PROMPTS[idx] + '\n\nCÓDIGO DO NOTEBOOK:\n' + code }
        ]
      })
    });
 
    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.error?.message || 'Erro na API Groq');
    }
 
    const data = await res.json();
    const raw  = data.choices?.[0]?.message?.content || '';
    let result;
    try { result = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch(e) { throw new Error('Formato de resposta inválido. Tente novamente.'); }
 
    results.push(result);
    narrativas.push(`[${LAYERS[idx].key.toUpperCase()}] ${result.narrativa}`);
 
    document.getElementById('thinkingCard').style.display = 'none';
    renderLayer(idx, result);
 
    if (idx + 1 < LAYERS.length) {
      showUpload(idx + 1);
    } else {
      updateStepper(3);
      renderFinal();
    }
 
  } catch(err) {
    document.getElementById('thinkingCard').style.display = 'none';
    document.getElementById('uploadCard').style.display = 'block';
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorBox').textContent = 'Erro: ' + err.message;
    document.getElementById('analyzeBtn').disabled = false;
  }
}
 
function renderLayer(i, r) {
  const L   = LAYERS[i];
  const nota = Number(r.nota).toFixed(1);
  const html = r.checks.map(c => {
    const cls  = c.status==='PASSOU' ? 'check-pass' : c.status==='PARCIAL' ? 'check-partial' : 'check-fail';
    const icon = c.status==='PASSOU' ? '✓' : c.status==='PARCIAL' ? '~' : '✗';
    return `<div class="check-item">
      <div class="check-icon ${cls}">${icon}</div>
      <div><div class="check-label">[${c.id}] ${c.titulo}</div><div class="check-detail">${c.detalhe}</div></div>
    </div>`;
  }).join('');
 
  const div = document.createElement('div');
  div.className = `layer-result ${L.key}`;
  div.innerHTML = `
    <div class="layer-result-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <div class="layer-result-title">${L.icon} Camada ${L.key.charAt(0).toUpperCase()+L.key.slice(1)}</div>
      <span class="score-pill ${L.pill}">${nota} / ${L.max} pts</span>
    </div>
    <div class="layer-result-body open">
      ${html}
      <div class="narrative">${r.narrativa}</div>
    </div>`;
  document.getElementById('resultsArea').appendChild(div);
}
 
function renderFinal() {
  const nb = Number(results[0]?.nota||0);
  const ns = Number(results[1]?.nota||0);
  const ng = Number(results[2]?.nota||0);
  const total = nb + ns + ng;
  const pct = (total/10)*100;
 
  document.getElementById('finalCard').style.display = 'block';
  document.getElementById('finalName').textContent = studentName;
  document.getElementById('scoreTotal').textContent = total.toFixed(1);
  document.getElementById('scBronze').textContent = nb.toFixed(1);
  document.getElementById('scSilver').textContent = ns.toFixed(1);
  document.getElementById('scGold').textContent   = ng.toFixed(1);
 
  const bar = document.getElementById('scoreBar');
  bar.style.width = pct + '%';
  bar.style.background = pct>=70 ? '#16a34a' : pct>=50 ? '#d97706' : '#dc2626';
 
  const report = [
    `ALUNO: ${studentName}`,
    `NOTA TOTAL: ${total.toFixed(1)} / 10`,
    `Bronze: ${nb.toFixed(1)}/2  |  Silver: ${ns.toFixed(1)}/5  |  Gold: ${ng.toFixed(1)}/3`,
    '', '='.repeat(50), 'ANÁLISE POR CAMADA', '='.repeat(50), '',
    ...narrativas, '',
    '='.repeat(50), 'CRITÉRIOS DETALHADOS', '='.repeat(50), '',
    ...LAYERS.map((L,i) => {
      const r = results[i]; if(!r) return '';
      return `--- ${L.key.toUpperCase()} ---\n` +
        r.checks.map(c=>`[${c.status}] ${c.id} — ${c.titulo}\n  ${c.detalhe}`).join('\n');
    })
  ].join('\n');
 
  document.getElementById('reportBox').textContent = report;
  document.getElementById('finalCard').scrollIntoView({ behavior:'smooth' });
}
 
function toggleReport() {
  document.getElementById('reportBox').classList.toggle('open');
}
 
function copyReport() {
  navigator.clipboard.writeText(document.getElementById('reportBox').textContent).then(() => {
    event.target.textContent = 'Copiado!';
    setTimeout(() => event.target.textContent = 'Copiar relatório', 2000);
  });
}
 
function resetAll() {
  idx=0; currentFile=null; results=[]; narrativas=[];
  studentName='';
  document.getElementById('nameCard').style.display='block';
  document.getElementById('stepper').style.display='none';
  document.getElementById('uploadCard').style.display='none';
  document.getElementById('thinkingCard').style.display='none';
  document.getElementById('finalCard').style.display='none';
  document.getElementById('errorBox').style.display='none';
  document.getElementById('resultsArea').innerHTML='';
  document.getElementById('studentName').value='';
  document.getElementById('reportBox').classList.remove('open');
}
</script>
</body>
</html>
